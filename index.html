<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sampoorn Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#12233D;
    --navy-2:#1B3A5C;
    --gold:#C89B3C;
    --gold-light:#E9C876;
    --bg:#F4F5F8;
    --surface:#FFFFFF;
    --line:#E3E6ED;
    --text:#1B2430;
    --text-dim:#6B7382;
    --green:#2F8F5B;
    --red:#C0392B;
    --amber:#B8791E;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}
  h1,h2,h3,.brand{font-family:'Outfit',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}

  /* ---------- Login ---------- */
  #loginScreen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(200,155,60,0.18), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(27,58,92,0.35), transparent 45%),
      var(--navy);
  }
  .login-card{
    width:380px;max-width:90vw;background:var(--surface);border-radius:16px;
    padding:36px 32px;box-shadow:0 30px 60px rgba(0,0,0,0.35);
  }
  .login-mark{
    width:52px;height:52px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--amber));
    display:flex;align-items:center;justify-content:center;color:var(--navy);font-weight:800;font-size:22px;
    margin-bottom:18px;font-family:'Outfit',sans-serif;
  }
  .login-card h1{font-size:22px;margin:0 0 2px;color:var(--navy);}
  .login-card .sub{color:var(--text-dim);font-size:13px;margin-bottom:24px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-dim);margin-bottom:6px;}
  .field input, .field select{
    width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:14px;background:#FBFBFD;
  }
  .field input:focus, .field select:focus{outline:none;border-color:var(--gold);background:#fff;}
  .btn-primary{
    width:100%;padding:11px;border:none;border-radius:8px;background:var(--navy);color:#fff;
    font-weight:700;font-size:14.5px;margin-top:6px;transition:background .15s;
  }
  .btn-primary:hover{background:var(--navy-2);}
  .btn-gold{background:var(--gold);color:var(--navy);}
  .btn-gold:hover{background:var(--gold-light);}
  .login-error{color:var(--red);font-size:12.5px;margin-top:10px;min-height:14px;}
  .login-toggle{text-align:center;margin-top:16px;font-size:12.5px;color:var(--text-dim);}
  .login-toggle a{color:var(--navy-2);font-weight:600;cursor:pointer;text-decoration:none;}

  /* ---------- App shell ---------- */
  #appScreen{display:none;min-height:100vh;}
  .shell{display:flex;min-height:100vh;}
  .sidebar{
    width:222px;background:var(--navy);color:#DCE3EE;flex-shrink:0;
    display:flex;flex-direction:column;padding:20px 0;
  }
  .sidebar .brand{display:flex;align-items:center;gap:10px;padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:14px;}
  .sidebar .brand .mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--amber));display:flex;align-items:center;justify-content:center;color:var(--navy);font-weight:800;font-size:15px;}
  .sidebar .brand .txt{font-weight:700;font-size:15px;color:#fff;line-height:1.15;}
  .sidebar .brand .txt span{display:block;font-size:10.5px;font-weight:500;color:var(--gold-light);letter-spacing:.5px;}
  .nav-item{
    padding:11px 20px;font-size:13.5px;font-weight:500;color:#B7C0D1;cursor:pointer;
    border-left:3px solid transparent;display:flex;align-items:center;gap:10px;
  }
  .nav-item:hover{background:rgba(255,255,255,0.05);color:#fff;}
  .nav-item.active{background:rgba(200,155,60,0.14);border-left-color:var(--gold);color:#fff;}
  .nav-section-label{padding:14px 20px 6px;font-size:10.5px;letter-spacing:.8px;color:#6E7A90;font-weight:700;text-transform:uppercase;}
  .sidebar-footer{margin-top:auto;padding:14px 20px 0;border-top:1px solid rgba(255,255,255,0.08);}
  .who{font-size:12.5px;color:#fff;font-weight:600;}
  .who-role{font-size:11px;color:var(--gold-light);margin-bottom:8px;}
  .logout-btn{width:100%;padding:8px;border:1px solid rgba(255,255,255,0.18);background:transparent;color:#DCE3EE;border-radius:7px;font-size:12.5px;}
  .logout-btn:hover{background:rgba(255,255,255,0.08);}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{
    height:60px;background:var(--surface);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;padding:0 26px;flex-shrink:0;
  }
  .topbar h2{font-size:17px;margin:0;color:var(--navy);}
  .topbar .crumb{font-size:12px;color:var(--text-dim);}
  .content{padding:26px;overflow-y:auto;flex:1;}

  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
  .stat-card .label{font-size:11.5px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
  .stat-card .val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--navy);margin-top:6px;}
  .stat-card.accent .val{color:var(--amber);}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:20px;}
  .panel-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:between;justify-content:space-between;}
  .panel-head h3{margin:0;font-size:15px;color:var(--navy);}
  .panel-body{padding:20px;}

  .btn-sm{padding:8px 14px;border:none;border-radius:7px;font-size:12.5px;font-weight:700;background:var(--navy);color:#fff;}
  .btn-sm:hover{background:var(--navy-2);}
  .btn-sm.gold{background:var(--gold);color:var(--navy);}
  .btn-outline{padding:7px 12px;border:1.5px solid var(--line);border-radius:7px;font-size:12px;font-weight:600;background:#fff;color:var(--text);}
  .btn-outline:hover{border-color:var(--navy);}
  .btn-danger-outline{padding:6px 10px;border:1.5px solid #F0D1CC;border-radius:7px;font-size:11.5px;font-weight:600;background:#FDF3F1;color:var(--red);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:9px 10px;background:#F7F8FA;color:var(--text-dim);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--line);}
  td{padding:10px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .empty-row td{text-align:center;color:var(--text-dim);padding:26px;font-size:13px;}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-grid .full{grid-column:1/-1;}
  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge.head{background:#E9E1FA;color:#5B3AA6;}
  .badge.area{background:#DDEFE4;color:var(--green);}
  .badge.branch{background:#FCE9D4;color:var(--amber);}
  .toast{
    position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:12px 18px;border-radius:8px;
    font-size:13px;box-shadow:0 10px 26px rgba(0,0,0,0.25);z-index:999;display:none;
  }
  .toast.err{background:var(--red);}
  .modal-bg{
    display:none;position:fixed;inset:0;background:rgba(18,35,61,0.55);z-index:500;
    align-items:center;justify-content:center;
  }
  .modal{background:#fff;border-radius:14px;width:460px;max-width:92vw;max-height:88vh;overflow-y:auto;padding:24px;}
  .modal h3{margin:0 0 16px;color:var(--navy);}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}
  .helper{font-size:11.5px;color:var(--text-dim);margin-top:4px;}
  .setup-banner{background:#FDF3E3;border:1px solid #F0DDA8;color:var(--amber);border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:16px;}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:#CBD2DE;border-radius:10px;}
  @media (max-width:800px){
    .sidebar{position:fixed;left:-222px;top:0;bottom:0;z-index:400;transition:left .2s;}
    .sidebar.open{left:0;}
    .form-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-mark">SF</div>
    <h1>Sampoorn Finance</h1>
    <div class="sub" id="loginSub">Apne office ke account se login karein</div>

    <div id="loginBox">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@sampoorn.in">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="doLogin()">Login</button>
      <div class="login-error" id="loginError"></div>
    </div>

    <div class="login-toggle">
      Pehli baar setup kar rahe hain? <a onclick="toggleSetup()">Head Office Admin banayein</a>
    </div>

    <div id="setupBox" style="display:none;margin-top:16px;border-top:1px solid var(--line);padding-top:16px;">
      <div class="setup-banner">Ye option sirf tab kaam karega jab system me abhi tak koi Head Office admin na ho.</div>
      <div class="field"><label>Aapka Naam</label><input id="setupName" placeholder="Naam"></div>
      <div class="field"><label>Email</label><input id="setupEmail" placeholder="admin@sampoorn.in"></div>
      <div class="field"><label>Password</label><input type="password" id="setupPassword" placeholder="Kam se kam 6 characters"></div>
      <button class="btn-primary btn-gold" onclick="doFirstAdminSetup()">Head Office Admin Banayein</button>
      <div class="login-error" id="setupError"></div>
    </div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="appScreen">
  <div class="shell">
    <div class="sidebar" id="sidebar">
      <div class="brand">
        <div class="mark">SF</div>
        <div class="txt">Sampoorn Finance<span id="roleTag">Head Office</span></div>
      </div>
      <div id="navItems"></div>
      <div class="sidebar-footer">
        <div class="who" id="whoName">—</div>
        <div class="who-role" id="whoRole">—</div>
        <button class="logout-btn" onclick="doLogout()">Logout</button>
      </div>
    </div>

    <div class="main">
      <div class="topbar">
        <h2 id="pageTitle">Dashboard</h2>
        <div class="crumb" id="pageCrumb"></div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ============ MODALS ============ -->
<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* =========================================================================
   SAMPOORN FINANCE — Phase 1
   Login/Role system + Head Office (Area Office, Branch, Staff)
   + Branch (Group, Customer)
   Backend: Firebase Auth + Firestore (Spark/free plan)

   SETUP STEPS (do this before using):
   1. Go to https://console.firebase.google.com -> Create Project (free Spark plan is fine)
   2. Build > Authentication > Get Started > Sign-in method > enable "Email/Password"
   3. Build > Firestore Database > Create database (start in production mode)
   4. Project settings (gear icon) > General > "Your apps" > Add app > Web (</>) 
      -> copy the firebaseConfig object and paste it below, replacing the placeholder.
   5. Firestore > Rules tab, paste the rules from FIRESTORE_RULES.txt (provided alongside
      this file) and Publish.
   6. Open this index.html in a browser (or host it on GitHub Pages), click
      "Head Office Admin banayein" and create your first admin account.
   ========================================================================= */

const firebaseConfig = {
  apiKey: "AIzaSyAsjMZVP9XmatbLM-kImw7VtH1afaiTyhM",
  authDomain: "sampoorn-finance.firebaseapp.com",
  projectId: "sampoorn-finance",
  storageBucket: "sampoorn-finance.firebasestorage.app",
  messagingSenderId: "40359742516",
  appId: "1:40359742516:web:92dae742167ba2c5fece61"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// secondary app instance used ONLY to create new staff/admin accounts
// without logging the currently signed-in admin out of their session
const secondaryApp = firebase.initializeApp(firebaseConfig, "Secondary");
const secondaryAuth = secondaryApp.auth();

let CURRENT_USER = null;   // { uid, name, email, role, areaId, branchId }
let CURRENT_TAB = null;

// ---------------- helpers ----------------
function toast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  t.style.display = 'block';
  setTimeout(()=> t.style.display='none', 3200);
}
function openModal(html){
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalBg').style.display = 'flex';
}
function closeModal(){ document.getElementById('modalBg').style.display = 'none'; }
function esc(s){ return (s===undefined||s===null) ? '' : String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function genId(){ return db.collection('_').doc().id; }

// ---------------- toggle setup box ----------------
function toggleSetup(){
  const s = document.getElementById('setupBox');
  s.style.display = s.style.display === 'none' ? 'block' : 'none';
}

// ---------------- FIRST ADMIN SETUP ----------------
async function doFirstAdminSetup(){
  const name = document.getElementById('setupName').value.trim();
  const email = document.getElementById('setupEmail').value.trim();
  const pass = document.getElementById('setupPassword').value;
  const errBox = document.getElementById('setupError');
  errBox.textContent = '';
  if(!name || !email || !pass){ errBox.textContent = 'Sabhi fields bharein'; return; }
  try{
    const setupSnap = await db.collection('system').doc('setup').get();
    if(setupSnap.exists && setupSnap.data().headOfficeCreated){
      errBox.textContent = 'Head Office admin pehle se ban chuka hai. Kripya login karein.';
      return;
    }
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await db.collection('users').doc(cred.user.uid).set({
      name, email, role:'headoffice', areaId:null, branchId:null, createdAt: Date.now()
    });
    await db.collection('system').doc('setup').set({ headOfficeCreated: true });
    toast('Head Office admin ban gaya! Ab login karein.');
    await auth.signOut();
    toggleSetup();
  }catch(e){
    errBox.textContent = e.message;
  }
}

// ---------------- LOGIN ----------------
async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  const errBox = document.getElementById('loginError');
  errBox.textContent = '';
  if(!email || !pass){ errBox.textContent = 'Email aur password dalein'; return; }
  try{
    await auth.signInWithEmailAndPassword(email, pass);
  }catch(e){
    errBox.textContent = 'Login fail: ' + e.message;
  }
}
function doLogout(){ auth.signOut(); }

auth.onAuthStateChanged(async (user)=>{
  if(!user){
    CURRENT_USER = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
    return;
  }
  const snap = await db.collection('users').doc(user.uid).get();
  if(!snap.exists){
    toast('User profile Firestore me nahi mila. Admin se sampark karein.', true);
    auth.signOut();
    return;
  }
  CURRENT_USER = Object.assign({uid:user.uid}, snap.data());
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  buildSidebar();
  const firstTab = CURRENT_USER.role === 'headoffice' ? 'ho-dashboard'
                 : CURRENT_USER.role === 'area' ? 'area-dashboard'
                 : 'branch-dashboard';
  showTab(firstTab);
});

// ---------------- SIDEBAR ----------------
function buildSidebar(){
  document.getElementById('whoName').textContent = CURRENT_USER.name;
  const roleLabels = {headoffice:'Head Office Admin', area:'Area Head', branch:'Branch Staff'};
  document.getElementById('whoRole').textContent = roleLabels[CURRENT_USER.role];
  document.getElementById('roleTag').textContent = roleLabels[CURRENT_USER.role];

  let items = '';
  if(CURRENT_USER.role === 'headoffice'){
    items += navItem('ho-dashboard','Dashboard');
    items += sectionLabel('Setup');
    items += navItem('ho-area','Area Office');
    items += navItem('ho-branch','Branch');
    items += navItem('ho-staff','Staff Management');
  } else if(CURRENT_USER.role === 'area'){
    items += navItem('area-dashboard','Dashboard');
    items += sectionLabel('Aapka Area');
    items += navItem('area-branches','Linked Branches');
  } else {
    items += navItem('branch-dashboard','Dashboard');
    items += sectionLabel('Kaam');
    items += navItem('branch-group','Group');
    items += navItem('branch-customer','Customer');
    items += sectionLabel('Aage Jald Hi');
    items += navItem('branch-soon-collection','Collection');
    items += navItem('branch-soon-loan','Loan');
    items += navItem('branch-soon-txn','Transaction');
    items += navItem('branch-soon-eod','E.O.D');
    items += navItem('branch-soon-reports','Reports');
  }
  document.getElementById('navItems').innerHTML = items;
}
function navItem(id,label){
  return `<div class="nav-item" id="nav-${id}" onclick="showTab('${id}')">${label}</div>`;
}
function sectionLabel(t){ return `<div class="nav-section-label">${t}</div>`; }

function setActiveNav(id){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('nav-'+id);
  if(el) el.classList.add('active');
}

// ---------------- ROUTER ----------------
function showTab(id){
  CURRENT_TAB = id;
  setActiveNav(id);
  const titles = {
    'ho-dashboard':['Dashboard','Head Office'],
    'ho-area':['Area Office','Head Office / Setup'],
    'ho-branch':['Branch','Head Office / Setup'],
    'ho-staff':['Staff Management','Head Office / Setup'],
    'area-dashboard':['Dashboard','Area Office'],
    'area-branches':['Linked Branches','Area Office'],
    'branch-dashboard':['Dashboard','Branch'],
    'branch-group':['Group','Branch'],
    'branch-customer':['Customer','Branch'],
    'branch-soon-collection':['Collection','Phase 2 me aayega'],
    'branch-soon-loan':['Loan','Phase 2 me aayega'],
    'branch-soon-txn':['Transaction','Phase 3 me aayega'],
    'branch-soon-eod':['E.O.D','Phase 3 me aayega'],
    'branch-soon-reports':['Reports','Phase 3 me aayega'],
  };
  document.getElementById('pageTitle').textContent = titles[id][0];
  document.getElementById('pageCrumb').textContent = titles[id][1];

  if(id === 'ho-dashboard') renderHoDashboard();
  else if(id === 'ho-area') renderHoArea();
  else if(id === 'ho-branch') renderHoBranch();
  else if(id === 'ho-staff') renderHoStaff();
  else if(id === 'area-dashboard') renderAreaDashboard();
  else if(id === 'area-branches') renderAreaBranches();
  else if(id === 'branch-dashboard') renderBranchDashboard();
  else if(id === 'branch-group') renderBranchGroup();
  else if(id === 'branch-customer') renderBranchCustomer();
  else document.getElementById('content').innerHTML = `<div class="panel"><div class="panel-body">Ye section agle phase me banega.</div></div>`;
}

/* =========================================================================
   HEAD OFFICE
   ========================================================================= */
async function renderHoDashboard(){
  const [areaSnap, branchSnap, staffSnap] = await Promise.all([
    db.collection('areaOffices').get(),
    db.collection('branches').get(),
    db.collection('users').where('role','in',['area','branch']).get()
  ]);
  document.getElementById('content').innerHTML = `
    <div class="stat-row">
      <div class="stat-card"><div class="label">Total Area Office</div><div class="val">${areaSnap.size}</div></div>
      <div class="stat-card"><div class="label">Total Branch</div><div class="val">${branchSnap.size}</div></div>
      <div class="stat-card accent"><div class="label">Total Staff</div><div class="val">${staffSnap.size}</div></div>
    </div>
    <div class="panel"><div class="panel-body">
      Head Office se Area Office, Branch aur Staff manage karein. Left sidebar se "Setup" section kholein.
      Borrower / Outstanding / Collection ke live stats Phase 2 (Loan &amp; Collection) ke baad yahan aayenge.
    </div></div>
  `;
}

// ---- Area Office CRUD ----
async function renderHoArea(){
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="panel">
      <div class="panel-head"><h3>Area Office</h3><button class="btn-sm gold" onclick="openAreaForm()">+ Naya Area Office</button></div>
      <div class="panel-body">
        <table><thead><tr><th>Naam</th><th>Address</th><th>Branches Linked</th><th></th></tr></thead>
        <tbody id="areaTableBody"><tr class="empty-row"><td colspan="4">Load ho raha hai...</td></tr></tbody></table>
      </div>
    </div>`;
  const [areaSnap, branchSnap] = await Promise.all([
    db.collection('areaOffices').orderBy('createdAt','desc').get(),
    db.collection('branches').get()
  ]);
  if(areaSnap.empty){
    document.getElementById('areaTableBody').innerHTML = `<tr class="empty-row"><td colspan="4">Abhi tak koi Area Office nahi bana.</td></tr>`;
    return;
  }
  let rows = '';
  areaSnap.forEach(doc=>{
    const d = doc.data();
    const linkedCount = branchSnap.docs.filter(b => b.data().areaId === doc.id).length;
    rows += `<tr>
      <td><strong>${esc(d.name)}</strong></td>
      <td>${esc(d.address||'—')}</td>
      <td>${linkedCount} branch</td>
      <td><button class="btn-outline" onclick="openAreaForm('${doc.id}')">Edit</button></td>
    </tr>`;

async function saveBranch(id){

// ---- Staff Management (create/link users, uses secondary auth app) ----
async function renderHoStaff(){
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="panel">
      <div class="panel-head"><h3>Staff Management</h3><button class="btn-sm gold" onclick="openStaffForm()">+ Naya Staff</button></div>
      <div class="panel-body">
        <table><thead><tr><th>Naam</th><th>Email</th><th>Role</th><th>Linked</th></tr></thead>
        <tbody id="staffTableBody"><tr class="empty-row"><td colspan="4">Load ho raha hai...</td></tr></tbody></table>
      </div>
    </div>`;
  const [userSnap, areaSnap, branchSnap] = await Promise.all([
    db.collection('users').where('role','in',['area','branch']).get(),
    db.collection('areaOffices').get(),
    db.collection('branches').get()
  ]);
  const areaMap = {}; areaSnap.forEach(d=> areaMap[d.id] = d.data().name);
  const branchMap = {}; branchSnap.forEach(d=> branchMap[d.id] = d.data().name);
  if(userSnap.empty){
    document.getElementById('staffTableBody').innerHTML = `<tr class="empty-row"><td colspan="4">Abhi tak koi staff nahi bana.</td></tr>`;
    return;
  }
  let rows = '';
  userSnap.forEach(doc=>{
    const d = doc.data();
    const badge = d.role === 'area' ? '<span class="badge area">Area Head</span>' : '<span class="badge branch">Branch Staff</span>';
    const linked = d.role === 'area' ? (areaMap[d.areaId]||'—') : (branchMap[d.branchId]||'—');
    rows += `<tr><td>${esc(d.name)}</td><td>${esc(d.email)}</td><td>${badge}</td><td>${esc(linked)}</td></tr>`;
  });
  document.getElementById('staffTableBody').innerHTML = rows;
}
async function openStaffForm(){
  const [areaSnap, branchSnap] = await Promise.all([
    db.collection('areaOffices').get(),
    db.collection('branches').get()
  ]);
  let areaOptions = '<option value="">— Select —</option>';
  areaSnap.forEach(d=> areaOptions += `<option value="${d.id}">${esc(d.data().name)}</option>`);
  let branchOptions = '<option value="">— Select —</option>';
  branchSnap.forEach(d=> branchOptions += `<option value="${d.id}">${esc(d.data().name)}</option>`);

  openModal(`
    <h3>Naya Staff Banayein</h3>
    <div class="field"><label>Naam</label><input id="sf_name"></div>
    <div class="field"><label>Email</label><input id="sf_email"></div>
    <div class="field"><label>Password (kam se kam 6 characters)</label><input type="password" id="sf_password"></div>
    <div class="field">
      <label>Role</label>
      <select id="sf_role" onchange="staffRoleChanged()">
        <option value="area">Area Head</option>
        <option value="branch">Branch Staff</option>
      </select>
    </div>
    <div class="field" id="sf_areaWrap"><label>Kaunsa Area Office</label><select id="sf_area">${areaOptions}</select></div>
    <div class="field" id="sf_branchWrap" style="display:none;"><label>Kaunsi Branch</label><select id="sf_branch">${branchOptions}</select></div>
    <div class="helper">Area Head sirf apne link kiye hue branches ka data dekh payega. Branch Staff sirf apni branch ka data dekh payega.</div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn-sm gold" onclick="saveStaff()">Banayein</button>
    </div>
  `);
}
function staffRoleChanged(){
  const role = document.getElementById('sf_role').value;
  document.getElementById('sf_areaWrap').style.display = role === 'area' ? 'block' : 'none';
  document.getElementById('sf_branchWrap').style.display = role === 'branch' ? 'block' : 'none';
}
async function saveStaff(){
  const name = document.getElementById('sf_name').value.trim();
  const email = document.getElementById('sf_email').value.trim();
  const password = document.getElementById('sf_password').value;
  const role = document.getElementById('sf_role').value;
  const areaId = role === 'area' ? (document.getElementById('sf_area').value || null) : null;
  const branchId = role === 'branch' ? (document.getElementById('sf_branch').value || null) : null;

  if(!name || !email || !password){ toast('Sabhi fields bharein', true); return; }
  if(role === 'area' && !areaId){ toast('Area Office select karein', true); return; }
  if(role === 'branch' && !branchId){ toast('Branch select karein', true); return; }

  try{
    // create via secondary app so the logged-in Head Office admin stays logged in
    const cred = await secondaryAuth.createUserWithEmailAndPassword(email, password);
    await db.collection('users').doc(cred.user.uid).set({
      name, email, role, areaId, branchId, createdAt: Date.now()
    });
    await secondaryAuth.signOut();
    closeModal(); toast('Staff account ban gaya'); renderHoStaff();
  }catch(e){ toast(e.message, true); }
}

    document.getElementById('groupTableBody').innerHTML = `<tr class="empty-row"><td colspan="3">Abhi tak koi group nahi bana.</td></tr>`;
    return;

async function renderBranchCustomer(){
  const c = document.getElementById('content');

        <table><thead><tr><th>Naam</th><th>Husband/Guardian</th><th>Phone</th><th>Group</th><th>Aadhaar</th></tr></thead>

    </div>`;

    db.collection('groups').where('branchId','==', CURRENT_USER.branchId).get()
  ]);

      <td class="mono">${esc(d.phone)}</td>

    </tr>`;
  });

async function openCustomerForm(){
  const groupSnap = await db.collection('groups').where('branchId','==', CURRENT_USER.branchId).get();
  if(groupSnap.empty){
    toast('Pehle ek Group banayein, phir Customer add karein', true);
    return;
  }
  let options = '<option value="">— Group Select Karein —</option>';
  const groupDayMap = {};
  groupSnap.forEach(doc=>{
    groupDayMap[doc.id] = doc.data().collectionDay;
    options += `<option value="${doc.id}">${esc(doc.data().name)}</option>`;
  });
  window._groupDayMap = groupDayMap;
  openModal(`
    <h3>Naya Customer</h3>
    <div class="form-grid">
      <div class="field full"><label>Group</label><select id="cf_group" onchange="customerGroupChanged()">${options}</select></div>
      <div class="field full"><label>Collection Day (Autometic)</label><input id="cf_day" disabled></div>
      <div class="field"><label>Customer Naam</label><input id="cf_name"></div>
      <div class="field"><label>D.O.B</label><input type="date" id="cf_dob"></div>
      <div class="field"><label>Phone Number (Mandatory)</label><input id="cf_phone"></div>
      <div class="field"><label>Alt. Phone (Optional)</label><input id="cf_altphone"></div>
      <div class="field full"><label>Address</label><input id="cf_address"></div>
      <div class="field"><label>Aadhaar Number</label><input id="cf_aadhaar"></div>
      <div class="field"><label>PAN Number</label><input id="cf_pan"></div>
      <div class="field full"><label>Husband / Guardian Naam</label><input id="cf_husband"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn-sm gold" onclick="saveCustomer()">Save</button>
    </div>
  `);
}
function customerGroupChanged(){
  const gid = document.getElementById('cf_group').value;
  document.getElementById('cf_day').value = window._groupDayMap[gid] || '';
}
async function saveCustomer(){
  const groupId = document.getElementById('cf_group').value;
  const name = document.getElementById('cf_name').value.trim();
  const dob = document.getElementById('cf_dob').value;
  const phone = document.getElementById('cf_phone').value.trim();
  const altPhone = document.getElementById('cf_altphone').value.trim();
  const address = document.getElementById('cf_address').value.trim();
  const aadhaar = document.getElementById('cf_aadhaar').value.trim();
  const pan = document.getElementById('cf_pan').value.trim();
  const husbandName = document.getElementById('cf_husband').value.trim();

  if(!groupId){ toast('Group select karein', true); return; }
  if(!name){ toast('Customer naam dalein', true); return; }
  if(!phone){ toast('Phone number mandatory hai', true); return; }

  try{
    await db.collection('customers').add({
      groupId, name, dob, phone, altPhone, address, aadhaar, pan, husbandName,
      branchId: CURRENT_USER.branchId, createdAt: Date.now()
    });
    closeModal(); toast('Customer ban gaya'); renderBranchCustomer();
  }catch(e){ toast(e.message, true); }
}
